name: modelserver

services:
  # llama.cpp base image for GGUF models
  # Supports older GPUs (Maxwell 5.2+) that don't work with vLLM's GGUF quantization
  llamacpp:
    build: ./llamacpp
    image: modelserver-llamacpp:latest
    # This service builds the base image for dynamic llama.cpp instances
    # Instances are created and managed by the webapp via Docker API
    # Do not run this service directly - it's only for building the image
    profiles:
      - build-only

  # vLLM base image for HuggingFace models and GGUF (requires compute capability 6.0+)
  vllm:
    build: ./vllm
    image: modelserver-vllm:latest
    # This service builds the base image for dynamic vLLM instances
    # Instances are created and managed by the webapp via Docker API
    # Do not run this service directly - it's only for building the image
    profiles:
      - build-only

  webapp:
    build: ./webapp
    image: modelserver-webapp:latest
    ports:
      - "3001:3001"      # HTTPS
      - "3080:3080"      # HTTP redirect to HTTPS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/usr/src/app/scripts
      - ./agents-cli:/usr/src/app/agents-cli
      - ./models:/models
      - ./certs:/certs:ro
      - webapp_data:/usr/src/app/data
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HOST_IP=${HOST_IP:-}
      # HOST_MODELS_PATH is auto-detected from container mount.
      # Only set manually if model loading fails (Windows+WSL edge cases):
      # - HOST_MODELS_PATH=${HOST_MODELS_PATH:-}
      #
      # SSL/TLS Configuration for Corporate Proxy Environments:
      # Set by build.sh automatically when SSL inspection is detected,
      # or set manually: NODE_TLS_REJECT_UNAUTHORIZED=0 ./start.sh
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-1}
      # NVML initialization requires these even when deploy.resources is set,
      # otherwise nvidia-smi inside the container fails with
      # "Failed to initialize NVML: Unknown Error" and GPU monitoring breaks.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Additional proxy settings (uncomment if needed):
      # - SSL_CERT_FILE=${SSL_CERT_FILE:-}
      # - NODE_EXTRA_CA_CERTS=${NODE_EXTRA_CA_CERTS:-}
      # - HTTPS_PROXY=${HTTPS_PROXY:-}
      # - HTTP_PROXY=${HTTP_PROXY:-}
      # - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Enable GPU access for system resource detection (nvidia-smi)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Optional GPU image-generation service. Disabled by default — the chat
  # `generate_image` skill is also disabled by default; flip both on
  # together when you want diffusion image gen:
  #   docker compose --profile imagegen up -d imagegen
  # then enable the `generate_image` skill in the webapp Skills UI.
  #
  # Cold start downloads SDXL-Turbo (~5GB) into the imagegen-cache volume
  # on first /generate request, then keeps the model warm in process
  # memory. Subsequent requests are 3-8s on a typical GPU.
  imagegen:
    build: ./imagegen
    image: modelserver-imagegen:latest
    profiles:
      - imagegen
    expose:
      - "5000"
    volumes:
      - imagegen_cache:/root/.cache/huggingface
    environment:
      - IMAGEGEN_MODEL=${IMAGEGEN_MODEL:-stabilityai/sdxl-turbo}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 60s

  # Chat interface - separate lightweight React app
  chat:
    build: ./chat
    image: modelserver-chat:latest
    ports:
      - "3002:3002"      # HTTPS
    volumes:
      - ./certs:/usr/src/app/certs:ro
      - ./models:/models    # Shared sessions with webapp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - webapp

volumes:
  webapp_data:
  # HF cache for the imagegen profile so SDXL-Turbo's ~5GB download
  # survives container restarts. Only created when the imagegen profile
  # is up — docker compose lazy-creates volumes referenced by services.
  imagegen_cache:
