name: modelserver

services:
  # llama.cpp base image for GGUF models
  # Supports older GPUs (Maxwell 5.2+) that don't work with sglang's GGUF quantization
  llamacpp:
    build: ./llamacpp
    image: modelserver-llamacpp:latest
    # This service builds the base image for dynamic llama.cpp instances
    # Instances are created and managed by the webapp via Docker API
    # Do not run this service directly - it's only for building the image
    profiles:
      - build-only

  # sglang base image for HuggingFace models and GGUF (requires compute capability 6.0+)
  sglang:
    build: ./sglang
    image: modelserver-sglang:latest
    # This service builds the base image for dynamic sglang instances
    # Instances are created and managed by the webapp via Docker API
    # Do not run this service directly - it's only for building the image
    profiles:
      - build-only

  webapp:
    build: ./webapp
    image: modelserver-webapp:latest
    ports:
      - "3001:3001"      # HTTPS
      - "3080:3080"      # HTTP redirect to HTTPS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/usr/src/app/scripts
      - ./models:/models
      - ./certs:/certs:ro
      - webapp_data:/usr/src/app/data
      # Read/list/delete the HF cache used by sglang HF-repo loads from the
      # webapp UI. Same named volume the sglang HF instances mount under
      # /root/.cache/huggingface — exposed here at /hf-cache for inspection.
      - hf_cache:/hf-cache
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HOST_IP=${HOST_IP:-}
      # HOST_MODELS_PATH is auto-detected from container mount.
      # Only set manually if model loading fails (Windows+WSL edge cases):
      # - HOST_MODELS_PATH=${HOST_MODELS_PATH:-}
      #
      # SSL/TLS Configuration for Corporate Proxy Environments:
      # Set by build.sh automatically when SSL inspection is detected,
      # or set manually: NODE_TLS_REJECT_UNAUTHORIZED=0 ./start.sh
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-1}
      # NVML initialization requires these even when deploy.resources is set,
      # otherwise nvidia-smi inside the container fails with
      # "Failed to initialize NVML: Unknown Error" and GPU monitoring breaks.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Container timezone — drives Node's `new Date()` local time, which the
      # automation scheduler uses to evaluate cron expressions. Without this
      # the container runs UTC and "0 6 * * *" fires at 06:00 UTC instead of
      # 6 AM Central. Override via TZ=... in .env if you're not in Chicago.
      - TZ=${TZ:-America/Chicago}
      # Additional proxy settings (uncomment if needed):
      # - SSL_CERT_FILE=${SSL_CERT_FILE:-}
      # - NODE_EXTRA_CA_CERTS=${NODE_EXTRA_CA_CERTS:-}
      # - HTTPS_PROXY=${HTTPS_PROXY:-}
      # - HTTP_PROXY=${HTTP_PROXY:-}
      # - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Enable GPU access for system resource detection (nvidia-smi)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Chat interface - separate lightweight React app
  chat:
    build: ./chat
    image: modelserver-chat:latest
    ports:
      - "3002:3002"      # HTTPS
    volumes:
      - ./certs:/usr/src/app/certs:ro
      - ./models:/models    # Shared sessions with webapp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - webapp

volumes:
  webapp_data:
  # HuggingFace cache for sglang HF-repo loads (safetensors / AWQ / GPTQ /
  # FP8 / NVFP4 / BnB). Survives model-instance container restarts so big
  # weights aren't redownloaded each time.
  hf_cache:
